<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雾霾检测系统 - 实时天气与空气质量监测</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
</head>
<body>
    <!-- 加载动画 -->
    <div id="loading" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
                    <p>正在加载雾霾检测系统...</p>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-cloud-sun"></i>
                    <h1>雾霾检测系统</h1>
                </div>
                <div class="location-info">
                    <div class="current-location">
                        <i class="fas fa-map-marker-alt"></i>
                        <span id="current-city">正在获取位置...</span>
                    </div>
                    <div class="location-details">
                        <span id="location-province"></span>
                        <span id="location-time" class="time"></span>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="refresh-btn" class="btn btn-primary">
                        <i class="fas fa-sync-alt"></i> 刷新数据
                    </button>
                    <button id="settings-btn" class="btn btn-secondary">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 主要内容区域 -->
        <main class="main-content">
            <!-- 天气卡片 -->
            <section class="weather-section">
                <div class="section-header">
                    <h2><i class="fas fa-sun"></i> 实时天气</h2>
                </div>
                <div class="weather-card" id="weather-card">
                    <div class="weather-loading">加载天气数据...</div>
                </div>
            </section>

            <!-- 空气质量卡片 -->
            <section class="air-quality-section">
                <div class="section-header">
                    <h2><i class="fas fa-wind"></i> 空气质量</h2>
                </div>
                <div class="air-quality-card" id="air-quality-card">
                    <div class="air-quality-loading">加载空气质量数据...</div>
                </div>
            </section>

            <!-- 24小时预报图表 -->
            <section class="forecast-section">
                <div class="section-header">
                    <h2><i class="fas fa-chart-line"></i> 24小时温湿度预报</h2>
                </div>
                <div class="forecast-card">
                    <div class="chart-container">
                        <canvas id="forecast-chart"></canvas>
                    </div>
                    <div class="chart-controls">
                        <button id="temp-chart-btn" class="chart-btn active">温度</button>
                        <button id="humidity-chart-btn" class="chart-btn">湿度</button>
                        <button id="both-chart-btn" class="chart-btn">温度+湿度</button>
                    </div>
                </div>
            </section>

            <!-- 健康建议 -->
            <section class="health-section">
                <div class="section-header">
                    <h2><i class="fas fa-heartbeat"></i> 健康建议</h2>
                </div>
                <div class="health-card" id="health-card">
                    <div class="health-loading">加载健康建议...</div>
                </div>
            </section>
        </main>

        <!-- 底部信息 -->
        <footer class="footer">
            <div class="footer-content">
                <div class="system-info">
                    <p>雾霾检测系统 v1.0 | 基于高德地图和风天气API</p>
                    <p id="system-status">系统状态: <span class="status-ok">正常</span></p>
                </div>
                <div class="data-info">
                    <p>数据更新: <span id="last-data-update">--:--:--</span></p>
                    <p>服务器: <span id="server-status">在线</span></p>
                </div>
            </div>
        </footer>
    </div>

    <!-- 设置面板 -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <h3><i class="fas fa-cog"></i> 系统设置</h3>
            <button id="close-settings" class="close-btn">&times;</button>
        </div>
        <div class="settings-content">
            <div class="setting-group">
                <h4><i class="fas fa-bell"></i> 通知设置</h4>
                <div class="setting-item">
                    <label>空气质量警报:</label>
                    <label class="switch">
                        <input type="checkbox" id="air-quality-alert" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label>更新频率:</label>
                    <select id="update-frequency">
                        <option value="5">5分钟</option>
                        <option value="10" selected>10分钟</option>
                        <option value="15">15分钟</option>
                        <option value="30">30分钟</option>
                    </select>
                </div>
            </div>
            <div class="setting-group">
                <h4><i class="fas fa-palette"></i> 显示设置</h4>
                <div class="setting-item">
                    <label>主题模式:</label>
                    <select id="theme-select">
                        <option value="light" selected>浅色模式</option>
                        <option value="dark">深色模式</option>
                        <option value="auto">自动</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>图表动画:</label>
                    <label class="switch">
                        <input type="checkbox" id="chart-animation" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="setting-actions">
                <button id="save-settings" class="btn btn-primary">保存设置</button>
                <button id="reset-settings" class="btn btn-secondary">恢复默认</button>
            </div>
        </div>
    </div>

    <!-- 通知容器 -->
    <div id="notification-container" class="notification-container"></div>

    <!-- JavaScript文件 -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/charts.js"></script>  <!-- 先加载图表管理器 -->
    <script src="js/ui.js"></script>      <!-- 后使用图表管理器 -->
    <script src="js/main.js"></script>
</body>
</html>
